<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuestionario con Imágenes y Score</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="quiz-container" id="quiz">
    <div class="question" id="question">
      <img src="Recursos_Graficos/Diapositiva1.jpg" alt="Imagen pregunta" id="question-img" />   
      <h2 id="question-text">¿Es autentico?</h2>
    </div>

    <ul class="options" id="options">
      <!-- Las opciones se generan dinámicamente -->
    </ul>

    <button id="next-btn">Siguiente</button>

    <div class="result" id="result" style="display: none;">
      <h2>Tu puntuación: <span id="score">0</span> / <span id="total">0</span></h2>
      <button id="save-btn">Guardar resultado</button>
      <p id="save-status"></p>
    </div>
  </div>

<script src="questions.js"></script>
<script src="SaveQuestions.js"></script>   
</body>
</html>
